{% set name = "twisted" %}
{% set version = "26.4.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz 
  sha256: dbfd0fe1ee409d0243fdd7a6a6ff14f4948cec1fd78e0376291f805e1501fae9

build:
  number: 0
  entry_points:
    - cftp = twisted.conch.scripts.cftp:run
    - ckeygen = twisted.conch.scripts.ckeygen:run
    - conch = twisted.conch.scripts.conch:run
    - mailmail = twisted.mail.scripts.mailmail:run
    - pyhtmlizer = twisted.scripts.htmlizer:run
    - tkconch = twisted.conch.scripts.tkconch:run
    - trial = twisted.scripts.trial:run
    - twist = twisted.application.twist._twist:Twist.main
    - twistd = twisted.scripts.twistd:run
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  skip: true  # [py<39]

requirements:
  host:
    - python
    - pip
    - hatchling >=1.10.0
    - hatch-fancy-pypi-readme >=22.5.0
    - incremental >=24.7.0 
  run:
    - python
    - zope.interface >=5
    - constantly >=15.1
    - incremental >=24.7.0
    - automat >=24.8.0
    - hyperlink >=17.1.1
    - attrs >=22.2.0
    - typing_extensions >=4.2.0
    # tls
    - pyopenssl >=25.2.0
    - service_identity >=18.1.0
    - idna >=2.4
    # conch
    - cryptography >=38
    - appdirs >=1.4.0
    - bcrypt >=3.2.1
    # websocket
    - wsproto
    # windows-platform
    - twisted-iocpsupport >=1.0.2  # [win]
    - pywin32 !=226  # [win]
  run_constrained:
    # Moved all the crypto and tls stuff under 'run'
    # serial
    - pyserial >=3.0
    # macos-platform
    - pyobjc-core >=12  # [py>=310 and osx]
    - pyobjc-framework-cfnetwork >=12  # [py>=310 and osx]
    - pyobjc-framework-cocoa >=12  # [py>=310 and osx]
    # http2
    - h2 >=3.0,<5.0
    - priority >=1.1.0,<2.0

test:
  imports:
    - twisted
    - twisted._threads
    - twisted.application
    - twisted.application.runner
    - twisted.application.twist
    - twisted.conch
    - twisted.conch.client
    - twisted.conch.insults
    - twisted.conch.openssh_compat
    - twisted.conch.scripts
    - twisted.conch.ssh
    - twisted.conch.ui
    - twisted.cred
    - twisted.enterprise
    - twisted.internet
    - twisted.internet.iocpreactor  # [win]
    - twisted.logger
    - twisted.mail
    - twisted.mail.scripts
    - twisted.names
    - twisted.pair
    - twisted.persisted
    - twisted.plugins
    - twisted.positioning
    - twisted.protocols
    - twisted.protocols.haproxy
    - twisted.python
    - twisted.runner
    - twisted.scripts
    - twisted.spread
    - twisted.tap
    - twisted.trial
    - twisted.trial._dist
    - twisted.web
    - twisted.web._auth
    - twisted.words
    - twisted.words.im
    - twisted.words.protocols
    - twisted.words.protocols.jabber
    - twisted.words.xish
  requires:
    - pip
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    # Following command runs tests according to the package documentation. Skip due to many test failures unrelated to build.
    # - python -m twisted.trial twisted
    # https://github.com/twisted/twisted/issues/11211
    - cftp --help  # [not win]
    - conch --help  # [not win]
    - ckeygen --help
    - mailmail --version
    - pyhtmlizer --help
    # _tkinter.TclError: no display name and no $DISPLAY environment variable
    - tkconch --help  # [win]
    - trial --help
    - twist --help
    - twistd --help

about:
  home: https://twisted.org
  license: MIT
  license_file: LICENSE
  license_family: MIT
  summary: An event-based framework for internet applications, written in Python
  description: |
    Twisted is an event-based framework for internet applications, written in Python.
  doc_url: https://docs.twisted.org
  dev_url: https://github.com/twisted/twisted

extra:
  recipe-maintainers:
    - nehaljwani
    - ocefpaf
